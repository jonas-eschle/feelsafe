pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.dart"
      exclude: '.*\.(g|freezed)\.dart$'
      run: dart format {staged_files}
      stage_fixed: true
    import-sorter:
      glob: "*.dart"
      exclude: '.*\.(g|freezed)\.dart$'
      run: dart run import_sorter:main --no-comments {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    analyze:
      run: flutter analyze
    test:
      run: flutter test
