name: guardianangela
description: "Guardian Angela - Personal safety app with dead man's switch"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # State management
  flutter_riverpod: ^3.0.0

  # Navigation
  go_router: ^17.1.0

  # Local storage
  hive_ce: ^2.2.0
  hive_ce_flutter: ^2.1.0
  # Drift + sqlite3 3.x with built-in SQLite3MultipleCiphers (SQLCipher-
  # compatible). The cipher build is selected via the `hooks` block at
  # the bottom of this pubspec — no separate sqlcipher_flutter_libs
  # dependency. Encryption is enabled per-connection via PRAGMA key in
  # lib/data/db/app_database.dart.
  drift: ^2.32.0
  sqlite3: ^3.3.1
  # Argon2id PIN hashing (reserved for Phase 11)
  crypt: ^4.3.0

  # Location
  geolocator: ^14.0.2

  # Permissions
  permission_handler: ^12.0.1

  # Phone/SMS/WhatsApp
  url_launcher: ^6.3.2

  # Audio
  just_audio: ^0.10.5
  # iOS headphone remote button support (C1)
  audio_service: ^0.18.17
  # Text-to-speech fallback when built-in voice asset is missing
  flutter_tts: ^4.2.5

  # Vibration
  vibration: ^3.1.8

  # Screen wake lock
  wakelock_plus: ^1.5.1

  # UUID generation
  uuid: ^4.5.3

  # Image picker (for fake call photo)
  image_picker: ^1.2.1

  # Audio recording (for fake call voice + auto-record)
  record: ^6.0.0

  # Camera flashlight strobe (FlashService — audit Q2)
  torch_light: ^1.1.0

  # File path
  path_provider: ^2.1.5
  path: ^1.9.1

  # Local notifications (disguised reminders)
  flutter_local_notifications: ^21.0.0

  # Background execution (foreground service)
  flutter_background_service: ^5.1.0
  flutter_background_service_android: ^6.2.7

  # Icons
  cupertino_icons: ^1.0.8
  crypto: ^3.0.7
  battery_plus: ^7.0.0
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.5
  share_plus: ^12.0.2
  local_auth: ^3.0.1
  clock: ^1.1.2
  package_info_plus: ^9.0.1
  device_info_plus: ^12.0.0
  flutter_contacts: ^2.0.2
  # @visibleForTesting / other static annotations
  meta: ^1.15.0
  home_widget: ^0.9.1

  # Telemetry (Phase 15) — Sentry EU host, opt-out-by-default. See
  # lib/core/telemetry/sentry_config.dart and D-TELEMETRY-1.
  sentry_flutter: ^9.0.0
  argon2: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_ce_generator: ^1.6.0
  build_runner: ^2.4.13
  drift_dev: ^2.32.0
  mocktail: ^1.0.4
  fake_async: ^1.3.3
  flutter_launcher_icons: ^0.14.4
  import_sorter: ^4.6.0
  checks: ^0.3.1
  test: ^1.30.0
  # Golden-image regression tests (D-TEST-12). Framework + helpers for
  # pixel-match goldens across a device matrix.
  golden_toolkit: ^0.15.0
  # Patrol end-to-end testing (Phase 16 test-strategy.md §7.4).
  # Flutter-aware runner with native-interaction helpers. Runs on
  # Android emulator / iOS simulator — NOT in the unit test pass.
  # See integration_test/ for smoke flows.
  integration_test:
    sdk: flutter
  patrol: ^4.5.0

  vibration_platform_interface: any
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#131118"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

import_sorter:
  comments: false
  emojis: false

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/audio/

# Build hooks (Dart 3.11+) — select the SQLite3MultipleCiphers build of
# sqlite3 so the database is SQLCipher-compatible without depending on
# the deprecated sqlcipher_flutter_libs package. The `sqlite3mc` source
# bundles encryption-capable SQLite for every supported platform.
hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc
