name: safewayhome
description: "SafeWayHome - Personal safety app with dead man's switch"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^17.1.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Location
  geolocator: ^14.0.2

  # Permissions
  permission_handler: ^12.0.1

  # Phone/SMS/WhatsApp
  url_launcher: ^6.3.2

  # Audio
  just_audio: ^0.10.5

  # Vibration
  vibration: ^3.1.8

  # Screen wake lock
  wakelock_plus: ^1.5.1

  # UUID generation
  uuid: ^4.5.3

  # Image picker (for fake call photo)
  image_picker: ^1.2.1

  # File path
  path_provider: ^2.1.5

  # Local notifications (disguised reminders)
  flutter_local_notifications: ^21.0.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  mocktail: ^1.0.4
  fake_async: ^1.3.3

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/audio/
