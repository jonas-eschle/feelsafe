name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Sort imports
        run: dart run import_sorter:main --no-comments --exit-if-changed

      - name: Regenerate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Check for stale generated files
        run: |
          if [ -n "$(git diff --name-only)" ]; then
            echo "::error::Generated files are stale. Run 'dart run build_runner build' and commit."
            git diff --name-only
            exit 1
          fi

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test

      # Pre-alpha dep policy: any direct dependency flagged as
      # `isDiscontinued: true` on pub.dev fails the build. The Phase 0
      # commit `e67f082` had to bail off `sqlcipher_flutter_libs` after
      # it was already rotting in the tree; this gate prevents another
      # silent EOL slip. See CLAUDE.md §"Dependency policy".
      - name: Audit for discontinued packages
        run: |
          set -euo pipefail
          flutter pub outdated --json > /tmp/outdated.json
          python3 - <<'PY'
          import json, sys
          with open('/tmp/outdated.json') as fh:
              data = json.load(fh)
          discontinued = [
              p['package']
              for p in data.get('packages', [])
              if p.get('isDiscontinued')
          ]
          if discontinued:
              names = ', '.join(discontinued)
              print(f'::error::Discontinued dependencies in pubspec: {names}.')
              print('Replace each with a maintained alternative; see '
                    'CLAUDE.md §Dependency policy for the recipe.')
              sys.exit(1)
          print('No discontinued dependencies detected.')
          PY

  # Phase 16 E2E pipeline — runs Patrol integration tests on an
  # Android 14 emulator. Gated on `v*` tags so PRs don't pay the
  # ~10-minute emulator boot cost. Manual dispatch is also allowed
  # via `workflow_dispatch` so release-owners can re-run on demand.
  #
  # TODO(e2e-owner): wire in the following secrets before enabling
  # this on `main`:
  #   - E2E_ANDROID_KEYSTORE_BASE64 + credentials (same as release).
  #   - Any test-only API keys (Sentry DSN override, fake SMS
  #     gateway) — keep them OUT of the built APK.
  e2e:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Install patrol CLI
        run: dart pub global activate patrol_cli
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' |
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run Patrol on Android 14 emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: patrol test -t integration_test/app_test.dart

  # Phase 15 release pipeline — triggers on `v*` tag push only.
  # Builds the signed Android AAB + iOS archive, uploads symbols to
  # Sentry (EU host), and publishes to GitHub Releases.
  #
  # TODO(release-owner): the following secrets must be populated in
  # repo settings before this workflow can succeed end-to-end:
  #   - ANDROID_KEYSTORE_BASE64: base64-encoded upload keystore (.jks).
  #   - ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS /
  #     ANDROID_KEY_PASSWORD: keystore credentials.
  #   - APPLE_CERTIFICATE_BASE64 / APPLE_CERTIFICATE_PASSWORD:
  #     signing identity for flutter build ipa.
  #   - APPLE_PROVISIONING_PROFILE_BASE64: distribution profile.
  #   - SENTRY_AUTH_TOKEN: Sentry CLI auth token (EU org).
  #   - SENTRY_ORG / SENTRY_PROJECT: Sentry slugs on the EU host.
  # Until those are wired, the tagged build will fail at the first
  # secret-referencing step — intentional, so we never ship an
  # unsigned / unsymbolicated build by accident.
  release-android:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get

      # TODO(release-owner): decode keystore + write key.properties
      #   echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > upload.jks
      #   cat > android/key.properties <<EOF
      #   storeFile=upload.jks
      #   storePassword=${ANDROID_KEYSTORE_PASSWORD}
      #   keyAlias=${ANDROID_KEY_ALIAS}
      #   keyPassword=${ANDROID_KEY_PASSWORD}
      #   EOF
      - name: Build signed AAB
        run: flutter build appbundle --release
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      # TODO(release-owner): install sentry-cli and upload native
      # debug-symbols (NDK) + Dart sourcemaps. The sentry_flutter
      # docs recommend `sentry-cli upload-dif` for NDK and
      # `sentry-cli sourcemaps upload` for Dart.
      - name: Upload symbols to Sentry (EU)
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        run: echo "TODO sentry-cli upload symbols"
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: build/app/outputs/bundle/release/*.aab

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/bundle/release/*.aab

  release-ios:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: quality
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get

      # TODO(release-owner): install Apple certs + provisioning
      # profile into the keychain before `flutter build ipa`.
      - name: Build IPA
        run: flutter build ipa --release --no-codesign
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      # TODO(release-owner): symbol upload via sentry-cli (EU host).
      - name: Upload symbols to Sentry (EU)
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        run: echo "TODO sentry-cli upload dSYM"
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: build/ios/ipa/*.ipa
