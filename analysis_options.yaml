include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "lib/l10n/**"
    - "old/**"
    - "old2/**"
    - "old3/**"
    - "old4/**"
    - "old5/**"

linter:
  rules:
    # directives_ordering conflicts with the project's import_sorter tool
    # (enforced via lefthook pre-commit). import_sorter groups imports by
    # source (dart: / external package: / internal package:guardianangela)
    # separated by blank lines, while directives_ordering wants a single
    # global alphabetical order. Since import_sorter is the canonical
    # ordering tool, directives_ordering is disabled to avoid conflict.
    directives_ordering: false
